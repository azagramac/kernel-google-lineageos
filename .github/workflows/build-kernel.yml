name: 🚀 Build Kernel Google for LineageOS

on:
  workflow_dispatch:
    inputs:
      aosp_repo:
        description: '🌱 Repo Kernel LineageOS'
        required: true
        default: 'https://github.com/LineageOS/android_kernel_google_gs-6.1_manifest'
      aosp_branch:
        description: '🌿 Branch Kernel LineageOS'
        required: true
        default: 'lineage-23.0'
      codename:
        description: '📱 Codename device'
        required: true
        default: 'Enter codename'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: 📦 Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git gnupg flex bison build-essential zip jq curl \
          zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev \
          lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo
      shell: bash

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🌳 Prepare or update AOSP tree
      run: |
        mkdir -p aosp_workspace
        cd aosp_workspace

        if [ ! -d ".repo" ]; then
          echo "🌱 Initializing AOSP for the first time..."
          repo init -u ${{ github.event.inputs.aosp_repo }} -b ${{ github.event.inputs.aosp_branch }} --depth=1 --no-tags
          repo sync -c -j4
        else
          echo "🔄 Updating existing AOSP checkout..."
          repo sync -c -j4 || echo "⚠️ Repo sync failed, continuing..."
        fi

        # Copiamos el contenido a la raíz del repo
        rsync -av --exclude='.repo' ./ ../
      shell: bash

    - name: 📤 Commit & Push AOSP tree
      uses: EndBug/add-and-commit@v9
      with:
        cwd: .
        add: '.'
        author_name: ${{ secrets.GIT_NAME }}
        author_email: ${{ secrets.GIT_MAIL }}
        message: "${{ github.event.inputs.codename }} - ($(date '+%d-%m-%Y %H:%M'))"
        pull: '--rebase --autostash origin master'
        push: true
        default_author: user_info
      env:
        GIT_ASKPASS: /bin/echo
        GIT_PASSWORD: ${{ secrets.GIT_PERSONAL_TOKEN }}

    - name: ⚙️ Build Kernel
      run: |
        bash private/devices/google/${{ github.event.inputs.codename }}/build_${{ github.event.inputs.codename }}.sh
      shell: bash

    - name: 📦 Upload ${{ github.event.inputs.codename }} Kernel
      uses: softprops/action-gh-release@v2
      with:
        tag_name: kernel-${{ github.run_number }}
        target_commitish: ${{ github.sha }}
        name: ${{ github.event.inputs.codename }} kernel ${{ github.event.inputs.aosp_branch }}
        files: kernel/out/${{ github.event.inputs.codename }}/dist/*.img
        overwrite_files: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
