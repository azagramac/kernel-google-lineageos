name: 🚀 Build Kernel Google for LineageOS

on:
  workflow_dispatch:
    inputs:
      aosp_repo:
        description: '🌱 Repo Kernel LineageOS'
        required: true
        default: 'https://github.com/LineageOS/android_kernel_google_gs-6.1_manifest'
      aosp_branch:
        description: '🌿 Branch Kernel LineageOS'
        required: true
        default: 'lineage-23.0'
      codename:
        description: '📱 Codename device'
        required: true
        default: 'Enter codename'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: 📦 Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git gnupg flex bison build-essential zip jq curl \
          zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev \
          lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo
      shell: bash

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 📥 Checkout repository into kernel
      uses: actions/checkout@v3
      with:
        path: kernel
        fetch-depth: 0

    - name: 🌳 Prepare or update AOSP tree in kernel
      run: |
        cd kernel
        if [ ! -d ".repo" ]; then
          echo "🌱 Initializing AOSP for the first time..."
          repo init -u ${{ github.event.inputs.aosp_repo }} -b ${{ github.event.inputs.aosp_branch }} --depth=1 --no-tags
          repo sync -c -j4
        else
          echo "🔄 Updating existing AOSP checkout..."
          repo sync -c -j4 || echo "⚠️ Repo sync failed, continuing..."
        fi
      shell: bash

    - name: ⚙️ Build Kernel
      run: |
        cd kernel
        bash private/devices/google/${{ github.event.inputs.codename }}/build_${{ github.event.inputs.codename }}.sh
      shell: bash

    - name: 📦 Upload ${{ github.event.inputs.codename }} Kernel
      uses: softprops/action-gh-release@v2
      with:
        tag_name: kernel-${{ github.run_number }}
        target_commitish: ${{ github.sha }}
        name: kernel ${{ github.event.inputs.aosp_branch }} for ${{ github.event.inputs.codename }}
        files: kernel/out/${{ github.event.inputs.codename }}/dist/*.img
        overwrite_files: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
