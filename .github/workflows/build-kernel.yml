name: 🚀 Build Kernel Google for LineageOS

on:
  workflow_dispatch:
    inputs:
      aosp_repo:
        description: '🌱 Repo Kernel LineageOS'
        required: true
        default: 'https://github.com/LineageOS/android_kernel_google_gs-6.1_manifest'
      aosp_branch:
        description: '🌿 Branch Kernel LineageOS'
        required: true
        default: 'lineage-23.0'
      codename:
        description: '📱 Codename device'
        required: true
        default: 'Enter codename'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
    - name: 📦 Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git gnupg flex bison build-essential zip jq curl \
          zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev \
          lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo
      shell: bash

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🌳 Prepare or update AOSP tree (only if >12h since last sync)
      run: |
        mkdir -p kernel
        cd kernel

        if [ ! -d ".repo" ]; then
          echo "🌱 Initializing for the first time..."
          repo init -u ${{ github.event.inputs.aosp_repo }} \
            -b ${{ github.event.inputs.aosp_branch }} --depth=1 --no-tags
          repo sync -c -j4
          date +%s > .last_sync
        else
          echo "🔍 Checking last sync timestamp..."
          NOW=$(date +%s)
          if [ -f ".last_sync" ]; then
            LAST=$(cat .last_sync)
            ELAPSED=$(( (NOW - LAST) / 3600 ))
          else
            ELAPSED=999
          fi

          if [ $ELAPSED -ge 12 ]; then
            echo "⏰ More than 12h since last sync ($ELAPSED h) — updating..."
            repo sync -c -j4 || echo "⚠️ Repo sync failed, continuing with existing sources."
            date +%s > .last_sync
          else
            echo "✅ Last sync was $ELAPSED h ago — skipping sync."
          fi
        fi
      shell: bash

    - name: 📤 Commit & Push AOSP tree
      uses: EndBug/add-and-commit@v9
      with:
        author_name: ${{ secrets.GIT_NAME }}
        author_email: ${{ secrets.GIT_MAIL }}
        message: "${{ github.event.inputs.codename }} - ($(date '+%Y-%m-%d %H:%M'))"
        add: "."
        git_push: true
        branch: master
        directory: kernel
        github_token: ${{ secrets.GIT_PERSONAL_TOKEN }}

    - name: ⚙️ Build Kernel
      run: |
        cd kernel
        export JAVA_HOME=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.17-10/x64
        export PATH=$JAVA_HOME/bin:$PATH
        bash private/devices/google/${{ github.event.inputs.codename }}/build_${{ github.event.inputs.codename }}.sh
      shell: bash

    - name: 📦 Upload ${{ github.event.inputs.codename }} Kernel
      uses: softprops/action-gh-release@v2
      with:
        tag_name: kernel-${{ github.run_number }}
        target_commitish: ${{ github.sha }}
        name: ${{ github.event.inputs.codename }} kernel ${{ github.event.inputs.aosp_branch }}
        files: kernel/out/${{ github.event.inputs.codename }}/dist/*.img
        overwrite_files: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
